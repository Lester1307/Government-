<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b" />
      <stop offset="30%" stop-color="#daa520" />
      <stop offset="70%" stop-color="#f0e68c" />
      <stop offset="100%" stop-color="#ffd700" />
    </linearGradient>
    <linearGradient id="saffronGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="100%" stop-color="#F4C430" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#128807" />
      <stop offset="100%" stop-color="#0F6304" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4" />

  <!-- Inner Decorative Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="10 6" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.2" />

  <!-- Saffron & Green Decorative Arc Highlights (Tri-color feel) -->
  <path d="M 76 256 A 180 180 0 0 1 436 256" fill="none" stroke="url(#saffronGrad)" stroke-width="4" stroke-linecap="round" opacity="0.15" />
  <path d="M 436 256 A 180 180 0 0 1 76 256" fill="none" stroke="url(#greenGrad)" stroke-width="4" stroke-linecap="round" opacity="0.15" />

  <!-- Ashoka Chakra Spokes Motif (Subtle in Background) -->
  <g opacity="0.08">
    <circle cx="256" cy="240" r="110" fill="none" stroke="#000080" stroke-width="2" />
    <!-- 24 Spokes -->
    <path d="M 256 130 L 256 350 M 146 240 L 366 240 M 178 162 L 334 318 M 178 318 L 334 162" stroke="#000080" stroke-width="1.5" />
  </g>

  <!-- Stylized Indian Parliament (Sansad Bhavan) Pillar Structure -->
  <g transform="translate(0, 10)">
    <!-- Parliament Base/Steps -->
    <rect x="116" y="340" width="280" height="12" rx="4" fill="url(#goldGrad)" />
    <rect x="126" y="352" width="260" height="14" rx="3" fill="#1e293b" stroke="url(#goldGrad)" stroke-width="2" />
    <rect x="100" y="366" width="312" height="16" rx="4" fill="url(#goldGrad)" />

    <!-- Colonnade (Semicircular Pillar Gallery) -->
    <!-- Back wall of the gallery -->
    <path d="M 136 230 L 376 230 L 376 340 L 136 340 Z" fill="#0f172a" />
    
    <!-- Row of Pillars -->
    <!-- 12 Pillars representing democratic strength -->
    <g fill="url(#goldGrad)">
      <rect x="146" y="234" width="8" height="102" rx="1.5" />
      <rect x="166" y="234" width="8" height="102" rx="1.5" />
      <rect x="186" y="234" width="8" height="102" rx="1.5" />
      <rect x="206" y="234" width="8" height="102" rx="1.5" />
      <rect x="226" y="234" width="8" height="102" rx="1.5" />
      <rect x="246" y="234" width="8" height="102" rx="1.5" />
      <rect x="260" y="234" width="8" height="102" rx="1.5" />
      <rect x="280" y="234" width="8" height="102" rx="1.5" />
      <rect x="300" y="234" width="8" height="102" rx="1.5" />
      <rect x="320" y="234" width="8" height="102" rx="1.5" />
      <rect x="340" y="234" width="8" height="102" rx="1.5" />
      <rect x="360" y="234" width="8" height="102" rx="1.5" />
    </g>

    <!-- Architraves and Frieze (Above Pillars) -->
    <path d="M 126 216 L 386 216 L 376 230 L 136 230 Z" fill="url(#goldGrad)" />
    
    <!-- Central Dome (Glow / Beacon of Democracy) -->
    <path d="M 216 216 A 40 40 0 0 1 296 216 Z" fill="url(#goldGrad)" filter="url(#glow)" />
    <path d="M 216 216 A 40 40 0 0 1 296 216 Z" fill="url(#saffronGrad)" opacity="0.6" />
    
    <!-- Dome Finial/Spire -->
    <line x1="256" y1="176" x2="256" y2="156" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    <circle cx="256" cy="152" r="5" fill="url(#goldGrad)" />
  </g>

  <!-- Starry / Democratic Constellation Accents -->
  <g fill="url(#goldGrad)" opacity="0.8">
    <path d="M 256 60 L 259 67 L 267 68 L 261 73 L 263 81 L 256 76 L 249 81 L 251 73 L 245 68 L 253 67 Z" />
  </g>

  <!-- Bold Title Text Accent (PM CABINET) -->
  <text x="256" y="440" font-family="'Inter', 'Space Grotesk', sans-serif" font-weight="900" font-size="28" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="4">LOK SABHA</text>
  <text x="256" y="470" font-family="'Inter', 'Space Grotesk', sans-serif" font-weight="600" font-size="16" fill="#94a3b8" text-anchor="middle" letter-spacing="2">CABINET SIMULATOR</text>
</svg>
